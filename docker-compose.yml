services:
  postgres:
    image: postgres:16-alpine
    container_name: hell-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-hell}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-hell_password_change_me}
      POSTGRES_DB: ${POSTGRES_DB:-hell_manhwa}
    ports:
      - "5432:5432"
    volumes:
      - hell_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-hell} -d ${POSTGRES_DB:-hell_manhwa}"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - hell_network

  redis:
    image: redis:7-alpine
    container_name: hell-redis
    restart: unless-stopped
    command: ["redis-server", "--appendonly", "yes"]
    ports:
      - "6379:6379"
    volumes:
      - hell_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 30
    networks:
      - hell_network

  minio:
    image: quay.io/minio/minio:latest
    container_name: hell-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${S3_ACCESS_KEY:-minio}
      MINIO_ROOT_PASSWORD: ${S3_SECRET_KEY:-minio_password_change_me}
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - hell_minio_data:/data
    networks:
      - hell_network

  create-minio-bucket:
    image: quay.io/minio/mc:latest
    container_name: hell-minio-init
    depends_on:
      - minio
    entrypoint: >
      /bin/sh -c "
      sleep 8;
      mc alias set local http://minio:9000 ${S3_ACCESS_KEY:-minio} ${S3_SECRET_KEY:-minio_password_change_me};
      mc mb --ignore-existing local/${S3_BUCKET:-hell-manhwa};
      mc anonymous set download local/${S3_BUCKET:-hell-manhwa};
      echo 'MinIO bucket is ready.';
      "
    networks:
      - hell_network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: hell-backend
    restart: unless-stopped
    env_file:
      - .env
    ports:
      - "4000:4000"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
      minio:
        condition: service_started
    command: >
          sh -c "
            npx prisma generate &&
            (if [ -d prisma/migrations ] && [ -n \"$(ls -A prisma/migrations 2>/dev/null)\" ]; then
              echo 'Running prisma migrate deploy...' &&
              npx prisma migrate deploy;
            else
              echo 'No migrations found, running prisma db push (development mode)...' &&
              npx prisma db push;
            fi) &&
            npm run prisma:seed &&
            npm run start:prod
          "
    networks:
      - hell_network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
      args:
        NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
        NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
        NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
    container_name: hell-frontend
    restart: unless-stopped
    env_file:
      - .env
    environment:
      NEXT_PUBLIC_APP_URL: ${NEXT_PUBLIC_APP_URL:-http://localhost:3000}
      NEXT_PUBLIC_API_URL: ${NEXT_PUBLIC_API_URL:-http://localhost:4000/api}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-http://localhost:4000}
      BACKEND_INTERNAL_URL: http://backend:4000/api
    ports:
      - "3000:3000"
    depends_on:
      - backend
    networks:
      - hell_network

volumes:
  hell_postgres_data:
  hell_redis_data:
  hell_minio_data:

networks:
  hell_network:
    driver: bridge
